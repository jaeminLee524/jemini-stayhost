services:
  mysql:
    image: mysql:8.0
    container_name: stayhost-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stayhost
      MYSQL_USER: stayhost
      MYSQL_PASSWORD: stayhost1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stayhost-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/stayhost?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: stayhost
      SPRING_DATASOURCE_PASSWORD: stayhost1234
      SPRING_PROFILES_ACTIVE: local
      JWT_SECRET: local-dev-secret-key-must-be-at-least-256-bits-long-for-hs256
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
